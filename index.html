<style>
/* BASE STYLES */
:root {
  --primary: #38bdf8;
  --primary-dark: #0ea5e9;
  --secondary: #1d4ed8;
  --dark-bg: #0b1220;
  --card-bg: #111827;
  --border: #1f2937;
  --text-light: #e5e7eb;
  --text-gray: #94a3b8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--dark-bg);
  color: var(--text-light);
  line-height: 1.6;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(11, 18, 32, 0.95);
  backdrop-filter: blur(10px);
  z-index: 1000;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(31, 41, 55, 0.5);
  transition: all 0.3s ease;
}

.navbar.scrolled {
  padding: 0.7rem 2rem;
  background: rgba(11, 18, 32, 0.98);
}

.logo {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.logo i {
  font-size: 22px;
}

.logo::after {
  content: "SOLUTIONS";
  color: var(--text-light);
  font-weight: 400;
  letter-spacing: 1px;
  margin-left: 0.5rem;
}

.nav-links {
  display: flex;
  gap: 2rem;
}

.nav-links a {
  color: var(--text-light);
  text-decoration: none;
  font-weight: 500;
  position: relative;
  padding: 0.5rem 0;
  transition: color 0.3s;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--primary);
  transition: width 0.3s ease;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-links a:hover::after {
  width: 100%;
}

/* HERO SECTION WITH PARALLAX */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(29, 78, 216, 0.1) 0%, transparent 50%),
    linear-gradient(135deg, #0f172a, #1e293b);
  z-index: -1;
}

.hero-content {
  max-width: 800px;
  animation: fadeInUp 1s ease-out 0.2s both;
}

.hero h1 {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  background: linear-gradient(90deg, var(--primary), #60a5fa);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1.2;
}

.hero p {
  font-size: 1.2rem;
  color: var(--text-gray);
  margin-bottom: 2rem;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* ANIMATED BUTTON */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem 2rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #000;
  font-weight: 600;
  border-radius: 50px;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  border: none;
  cursor: pointer;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.7s ease;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}

.btn-outline:hover {
  background: var(--primary);
  color: #000;
}

/* SECTIONS */
.section {
  padding: 5rem 2rem;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-title {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  position: relative;
  display: inline-block;
}

.section-title::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 0;
  width: 60px;
  height: 4px;
  background: var(--primary);
  border-radius: 2px;
}

.section-subtitle {
  color: var(--text-gray);
  margin-bottom: 3rem;
  max-width: 700px;
}

/* GRID & CARDS WITH ANIMATIONS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2rem;
  margin-top: 2rem;
}

.card {
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 16px;
  border: 1px solid var(--border);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
}

.card.revealed {
  animation: slideUp 0.8s ease forwards;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card:hover::before {
  opacity: 1;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  border-color: var(--primary);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
}

.card-icon {
  font-size: 2.5rem;
  color: var(--primary);
  margin-bottom: 1rem;
}

.card h3 {
  font-size: 1.3rem;
  margin-bottom: 0.8rem;
  color: var(--text-light);
}

.card p {
  color: var(--text-gray);
  font-size: 0.95rem;
}

/* STATS COUNTER */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2rem;
  margin: 4rem 0;
}

.stat-card {
  text-align: center;
  padding: 2rem;
  background: rgba(17, 24, 39, 0.5);
  border-radius: 12px;
  border: 1px solid rgba(31, 41, 55, 0.3);
  transition: transform 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-5px);
  border-color: var(--primary);
}

.stat-number {
  font-size: 3rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 0.5rem;
}

.stat-label {
  color: var(--text-gray);
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* TAG STYLES */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  margin-top: 2rem;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(29, 78, 216, 0.2);
  color: #60a5fa;
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
  border-radius: 50px;
  border: 1px solid rgba(96, 165, 250, 0.3);
  transition: all 0.3s ease;
}

.tag:hover {
  background: rgba(29, 78, 216, 0.4);
  transform: translateY(-2px);
}

.tag i {
  font-size: 0.8rem;
}

/* CONTACT FORM */
.contact-form {

  padding: 3rem;
  border-radius: 16px;
  border: 1px solid var(--border);

.form-group {

}

.form-group label {

  margin-bottom: 0.5rem;
  color: var(--text-light);
  font-weight: 500;
}

.form-control {
  width: 100%;
  padding: 1rem;
  background: rgba(31, 41, 55, 0.5);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-light);
  font-family: inherit;
  transition: all 0.3s ease;
}

.form-control:focus {

  border-color: var(--primary);

.footer-links a {

.footer-links a:hover {

.copyright {

/* ANIMATIONS */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}

@keyframes pulse {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.7;
  }

  .navbar {

  }

    grid-template-columns: 1fr;
  }
  
  .stats {
    grid-template-columns: 1fr;
  }
}
</stylehead>

<script>
// Navbar scroll effect
window.addEventListener('scroll', function() {
  const navbar = document.querySelector('.navbar');
  if (window.scrollY > 50) {
    navbar.classList.add('scrolled');
  } else {
    navbar.classList.remove('scrolled');
  }
});

// Animated counter for stats
function animateCounter() {
  const counters = document.querySelectorAll('.stat-number');
  const speed = 200;
  
  counters.forEach(counter => {
    const target = +counter.getAttribute('data-count');
    const increment = target / speed;
    let current = 0;
    
    const updateCounter = () => {
      if (current < target) {
        current += increment;
        counter.innerText = Math.ceil(current);
        setTimeout(updateCounter, 10);
      } else {
        counter.innerText = target;
      }
    };
    
    updateCounter();
  });
}

// Card reveal animation on scroll
function revealCards() {
  const cards = document.querySelectorAll('.card');
  const windowHeight = window.innerHeight;
  
  cards.forEach(card => {
    const cardTop = card.getBoundingClientRect().top;
    if (cardTop < windowHeight - 100) {
      card.classList.add('revealed');
    }
  });
}

// Initialize animations
window.addEventListener('load', () => {
  revealCards();
  
  // Animate stats when they come into view
  const statsSection = document.querySelector('.stats');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animateCounter();
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.5 });
  
  if (statsSection) {
    observer.observe(statsSection);
  }
});

// Scroll event for card reveal
window.addEventListener('scroll', revealCards);

// Form submission (placeholder)
document.querySelector('.contact-form .btn').addEventListener('click', function(e) {
  e.preventDefault();
  alert('Thank you for your interest! This is a demo form. In a real implementation, this would send your inquiry to our team.');
  document.querySelector('.contact-form').reset();
});

// Smooth scroll for nav links
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    const targetId = this.getAttribute('href');
    if (targetId === '#') return;
    
    const targetElement = document.querySelector(targetId);
    if (targetElement) {
      window.scrollTo({
        top: targetElement.offsetTop - 80,
        behavior: 'smooth'
      });
    }
  });
});
